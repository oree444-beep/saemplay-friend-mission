<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>친구찾기 챌린지 V1</title>
  <style>
    :root{--bg:#071126;--panel:#101c36;--panel2:#17274c;--line:#2d4275;--text:#fff;--muted:#b9c8ee;--accent:#7c5cff;--good:#22d3a6;--warn:#ffd34d;--danger:#ff5b73}
    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top,#172a56 0,#071126 45%,#030712 100%);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;min-height:100vh}
    button,input,select,textarea{font-family:inherit} button{cursor:pointer;border:0;border-radius:14px;padding:12px 18px;font-weight:800;color:#fff;background:#294170;box-shadow:0 3px 0 rgba(0,0,0,.28)} button:hover{filter:brightness(1.08)} button.primary{background:linear-gradient(135deg,#7c5cff,#3968ff)} button.good{background:#119c7d} button.warn{background:#e5aa14;color:#111} button.danger{background:#d73755} button.ghost{background:#192843;border:1px solid var(--line);box-shadow:none} button.small{padding:7px 10px;border-radius:10px;font-size:13px} button:disabled{opacity:.45;cursor:not-allowed;filter:grayscale(1)}
    .top{position:sticky;top:0;z-index:10;background:rgba(5,10,24,.9);backdrop-filter:blur(12px);border-bottom:1px solid #25375f;padding:18px 24px;display:flex;justify-content:space-between;gap:16px;align-items:center}.brand{display:flex;gap:14px;align-items:center}.logo{width:48px;height:48px;border-radius:14px;background:#263f7b;display:grid;place-items:center;font-size:28px}.title h1{margin:0;font-size:26px}.title p{margin:4px 0 0;color:var(--muted);font-size:14px}.badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;background:rgba(34,211,166,.15);color:#6fffd4;border:1px solid rgba(34,211,166,.35);padding:4px 9px;font-size:12px;font-weight:800}
    .wrap{max-width:1240px;margin:0 auto;padding:24px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.card{background:linear-gradient(180deg,rgba(16,28,54,.96),rgba(11,20,42,.96));border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:0 18px 48px rgba(0,0,0,.24)}.card h2,.card h3{margin:0 0 12px}.muted{color:var(--muted)}.hidden{display:none!important}.navBtns{display:flex;gap:10px;flex-wrap:wrap}.gameTile{min-height:170px;display:flex;flex-direction:column;justify-content:space-between}.tileTitle{font-size:24px;font-weight:900}.status{color:#ffe073}.formGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}label{display:block;font-weight:800;color:#d9e5ff;margin-bottom:7px}input,select,textarea{width:100%;background:#081225;color:#fff;border:1px solid #395184;border-radius:12px;padding:12px;font-size:15px}textarea{min-height:90px;resize:vertical}.pillBox{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.pill{border-radius:999px;border:1px solid #365183;background:#101e3d;padding:7px 10px;color:#cfe0ff;font-size:13px;font-weight:800}.missionList{display:grid;gap:10px;max-height:430px;overflow:auto;padding-right:4px}.missionRow{display:grid;grid-template-columns:auto auto 1fr auto auto auto;align-items:center;gap:8px;background:#0a1630;border:1px solid #243961;border-radius:14px;padding:10px}.missionText{font-weight:800}.missionTag{font-size:12px;color:#b9c8ee}.star.on{background:#ffd34d;color:#111}.x.on{background:#ff5b73}.promise{display:grid;place-items:center;min-height:calc(100vh - 86px);text-align:center}.promiseBox{max-width:900px;width:94%;background:linear-gradient(180deg,#111f3c,#071126);border:2px solid #395184;border-radius:30px;padding:46px}.promiseBox h2{font-size:52px;margin:0 0 24px}.rules{display:grid;gap:14px;margin:24px auto;max-width:720px;text-align:left}.rule{font-size:34px;font-weight:900;background:#13264c;border:1px solid #33528b;border-radius:20px;padding:18px 22px}.tv{min-height:calc(100vh - 86px);display:grid;place-items:center;text-align:center;padding:28px}.tvBox{width:min(1180px,96vw);min-height:620px;border-radius:32px;border:2px solid #395184;background:radial-gradient(circle at top,#1b3570,#09152d 58%,#020714);padding:34px;display:flex;flex-direction:column;justify-content:center}.round{font-size:28px;color:#9fc0ff;font-weight:900}.countdown{font-size:180px;font-weight:1000;line-height:1;color:#ffd34d;text-shadow:0 8px 0 rgba(0,0,0,.3)}.missionMain{font-size:70px;line-height:1.15;font-weight:1000;word-break:keep-all}.safeLine{font-size:34px;font-weight:900;color:#6fffd4;margin-bottom:18px}.timer{font-size:110px;font-weight:1000;color:#22d3a6}.bar{height:20px;background:#0b1730;border:1px solid #365183;border-radius:999px;overflow:hidden;margin:28px auto;width:86%}.barIn{height:100%;width:100%;background:linear-gradient(90deg,#22d3a6,#ffd34d)}.resultList{display:grid;gap:10px}.scoreRow{display:flex;justify-content:space-between;align-items:center;background:#0b1730;border:1px solid #2d4275;border-radius:14px;padding:12px 14px;font-weight:900}.remotePanel{position:fixed;right:18px;bottom:18px;z-index:20;background:rgba(8,18,37,.94);border:1px solid #3b5486;border-radius:20px;padding:14px;display:flex;gap:8px;flex-wrap:wrap;max-width:420px}.note{background:#081225;border:1px solid #365183;border-radius:14px;padding:12px;color:#cfe0ff}.footer{color:#8193bd;font-size:13px;text-align:center;margin:24px 0}
    @media(max-width:840px){.grid,.formGrid{grid-template-columns:1fr}.missionRow{grid-template-columns:auto auto 1fr}.top{align-items:flex-start;flex-direction:column}.promiseBox h2{font-size:36px}.rule{font-size:22px}.missionMain{font-size:42px}.countdown{font-size:120px}.timer{font-size:72px}.remotePanel{position:static;margin:12px}}
  </style>
</head>
<body>
  <header class="top">
    <div class="brand"><div class="logo">🤝</div><div class="title"><h1>친구찾기 챌린지 V1</h1><p>쌤플레이 게임실험실 안에서 테스트하는 친구찾기 챌린지 독립 테스트판</p></div></div>
    <div class="navBtns"><button class="ghost" onclick="showHub()">처음으로</button><button class="primary" onclick="openFriend()">친구찾기 챌린지</button><span class="badge">테스트 전용</span></div>
  </header>
  <main id="app" class="wrap"></main>
  <script>
    const VERSION='V1';
    const DEFAULT_MISSIONS=[
      ['같은 색 옷 친구와 하이파이브','친구찾기'],['오늘 웃은 친구와 손 흔들기','친구찾기'],['키가 비슷한 친구와 짝 만들기','짝'],['3명 모여 삼각형 만들기','모양'],['4명 모여 네모 만들기','모양'],['친구에게 “잘했어!” 말하기','칭찬'],['친구에게 엄지척 해주기','칭찬'],['같은 팀 친구와 파이팅 외치기','팀'],['짝과 박수 3번 맞추기','신남'],['친구와 같은 포즈 만들기','조용히'],
      ['서로 눈 마주치고 인사하기','조용히'],['생일 달이 가까운 친구 찾기','친구찾기'],['운동화 색이 비슷한 친구 찾기','친구찾기'],['양말 색이 비슷한 친구 찾기','친구찾기'],['머리 길이가 비슷한 친구 찾기','친구찾기'],['오늘 처음 말한 친구와 인사하기','사회성'],['친구와 큰 하트 만들기','모양'],['2명이 별 모양 포즈 만들기','모양'],['3명이 기차처럼 줄서기','팀'],['친구와 점프 2번 같이 하기','신남'],
      ['짝과 손뼉 리듬 따라하기','신남'],['친구에게 박수 선물하기','칭찬'],['오늘 멋진 친구 찾아 엄지척','칭찬'],['같은 학년 친구와 손 흔들기','친구찾기'],['다른 학년 친구와 인사하기','친구찾기'],['가까운 친구와 나란히 서기','조용히'],['가장 조용히 짝 만들기','조용히'],['3명 모여 작은 원 만들기','모양'],['4명 모여 큰 원 만들기','모양'],['팀원끼리 구호 한 번 외치기','팀'],
      ['친구와 가위바위보 한 번 하기','놀이'],['이긴 친구에게 박수하기','놀이'],['진 친구에게 “괜찮아!” 말하기','배려'],['짝과 서로 이름 부르기','사회성'],['친구의 좋은 점 하나 말하기','칭찬'],['선생님 가까이 모여 조용히 손들기','질서'],['벽 가까이 가지 않고 짝 찾기','안전'],['뛰지 않고 가장 빠르게 짝 찾기','질서'],['친구와 브이 포즈 만들기','포즈'],['친구와 슈퍼맨 포즈 만들기','포즈'],
      ['3명이 만세 포즈 만들기','포즈'],['2명이 거울처럼 같은 동작하기','포즈'],['친구와 발끝 맞춰 서기','조용히'],['친구와 어깨동무 없이 나란히 서기','안전'],['친구에게 고개 숙여 인사하기','예절'],['가장 가까운 친구와 하이파이브','친구찾기'],['가장 멀리 있던 친구에게 손 흔들기','친구찾기'],['짝과 제자리 점프 3번','신남'],['3명 모여 제자리 박수 5번','신남'],['팀원끼리 둥글게 모이기','팀'],
      ['친구와 동물 포즈 만들기','포즈'],['친구와 로봇 포즈 만들기','포즈'],['친구와 하트 손 만들기','모양'],['3명 모여 산 모양 만들기','모양'],['4명 모여 다리 모양 만들기','모양'],['친구에게 “고마워” 말하기','배려'],['친구에게 “반가워” 말하기','사회성'],['혼자 있는 친구 찾아 인사하기','배려'],['짝과 조용히 손 흔들기','조용히'],['선생님 신호에 모두 멈추기','질서']
    ].map((m,i)=>({id:'m'+(i+1),text:m[0],tag:m[1],favorite:i<12,excluded:false,deleted:false}));
    let state={screen:'friend',missions:loadMissions(),scores:loadScores(),settings:{rounds:5,timeMode:'10',customTime:10,scope:'favorite'},roundIndex:0,current:null,phase:'idle',left:10,timer:null,countTimer:null,used:[]};
    function save(){localStorage.setItem('friendMissionsV1',JSON.stringify(state.missions));localStorage.setItem('friendScoresV1',JSON.stringify(state.scores));}
    function loadMissions(){try{return JSON.parse(localStorage.getItem('friendMissionsV1'))||DEFAULT_MISSIONS}catch(e){return DEFAULT_MISSIONS}}
    function loadScores(){try{return JSON.parse(localStorage.getItem('friendScoresV1'))||[]}catch(e){return []}}
    const $=id=>document.getElementById(id); const app=()=>document.getElementById('app');
    function showHub(){clearAll(); state.screen='friend'; app().className='wrap'; renderSetup();}
    function openFriend(){clearAll(); state.screen='friend'; app().className='wrap'; renderSetup();}
    function availableMissions(){let list=state.missions.filter(m=>!m.deleted); if(state.settings.scope==='favorite'){let fav=list.filter(m=>m.favorite&&!m.excluded); return fav.length?fav:list.filter(m=>!m.excluded)} if(state.settings.scope==='exclude')return list.filter(m=>!m.excluded); return list;}
    function renderSetup(){app().innerHTML=`<section class="card"><h2>친구찾기 챌린지 V1</h2><p class="muted">기존 쌤플레이 정식판과 분리된 배포 전 테스트용입니다.</p><div class="formGrid"><div><label>미션 횟수</label><select id="rounds"><option>3</option><option selected>5</option><option>7</option><option>10</option></select></div><div><label>제한시간</label><select id="timeMode"><option value="5">5초</option><option value="7">7초</option><option value="10" selected>10초</option><option value="15">15초</option><option value="random">랜덤 5~15초</option><option value="custom">직접입력</option></select></div><div><label>직접입력 시간</label><input id="customTime" type="number" min="3" max="60" value="10"></div><div><label>미션 범위</label><select id="scope"><option value="favorite">즐겨찾기만, 없으면 X 제외</option><option value="exclude">X 제외 전체</option><option value="all">전체 미션</option></select></div></div><div class="pillBox"><span class="pill">사용 가능 미션 ${availableMissions().length}개</span><span class="pill">즐겨찾기 ${state.missions.filter(m=>m.favorite&&!m.deleted).length}개</span><span class="pill">제외 ${state.missions.filter(m=>m.excluded&&!m.deleted).length}개</span></div><div class="navBtns" style="margin-top:18px"><button class="primary" onclick="applySettings();showPromise()">친구찾기 약속 보기</button><button class="ghost" onclick="renderMissionAdmin()">미션 관리</button><button class="ghost" onclick="renderScores()">점수표 확인</button></div></section>`;}
    function applySettings(){state.settings.rounds=parseInt($('rounds').value||5);state.settings.timeMode=$('timeMode').value;state.settings.customTime=parseInt($('customTime').value||10);state.settings.scope=$('scope').value;state.roundIndex=0;state.used=[];}
    function showPromise(){clearAll(); app().className='promise'; app().innerHTML=`<div class="promiseBox"><h2>친구찾기 약속!</h2><div class="rules"><div class="rule">🚶 뛰지 않기</div><div class="rule">🙌 밀지 않기</div><div class="rule">💛 친구가 싫어하면 억지로 잡지 않기</div><div class="rule">🛑 선생님 신호에 멈추기</div></div><p class="muted">선생님이 아이들과 약속을 읽고 다음 진행을 눌러주세요.</p><button class="primary" style="font-size:24px;padding:18px 32px" onclick="nextMission()">다음 진행</button></div>`;}
    function pickMission(){let pool=availableMissions().filter(m=>!state.used.includes(m.id)); if(!pool.length){state.used=[];pool=availableMissions()} return pool[Math.floor(Math.random()*pool.length)];}
    function getTime(){let m=state.settings.timeMode;if(m==='random')return 5+Math.floor(Math.random()*11); if(m==='custom')return Math.max(3,Math.min(60,state.settings.customTime||10)); return parseInt(m||10);}
    function nextMission(){clearAll(); if(state.roundIndex>=state.settings.rounds){showFinished();return} state.current=pickMission(); state.used.push(state.current.id); state.roundIndex++; state.left=getTime(); showCountdown(3);}
    function showCountdown(n){app().className='tv'; app().innerHTML=`<div class="tvBox"><div class="round">친구찾기 미션 ${state.roundIndex} / ${state.settings.rounds}</div><div class="countdown">${n}</div><p class="muted">띵... 띵... 띵...</p></div>`; if(n<=0){startMission();return} state.countTimer=setTimeout(()=>showCountdown(n-1),850);}
    function startMission(){app().className='tv'; app().innerHTML=`<div class="tvBox"><div class="round">친구찾기 미션 ${state.roundIndex} / ${state.settings.rounds}</div><div class="safeLine">걸어서 찾아요!</div><div class="missionMain">${escapeHtml(state.current.text)}</div><div class="bar"><div id="barIn" class="barIn"></div></div><div class="timer"><span id="left">${state.left}</span>초</div><p class="muted">똑딱 똑딱... 선생님 신호에 멈춰요.</p></div>${remoteButtons()}`; const total=state.left; state.timer=setInterval(()=>{state.left--; if($('left'))$('left').textContent=state.left; if($('barIn'))$('barIn').style.width=Math.max(0,state.left/total*100)+'%'; if(state.left<=0)missionEnd()},1000);}
    function missionEnd(){clearAll(false); app().className='tv'; app().innerHTML=`<div class="tvBox"><div class="countdown" style="font-size:120px;color:#ff5b73">쿵!</div><div class="missionMain">멈춰!</div><p class="safeLine">다음 미션 준비</p><div class="navBtns" style="justify-content:center;margin-top:22px"><button class="good" onclick="recordWinner()">성공자 기록</button><button class="primary" onclick="nextMission()">다음 미션</button><button class="ghost" onclick="renderSetup()">설정으로</button></div></div>${remoteButtons()}`;}
    function remoteButtons(){return `<div class="remotePanel"><button class="small primary" onclick="nextMission()">다음 진행</button><button class="small good" onclick="recordWinner()">성공자 기록</button><button class="small ghost" onclick="renderScores()">점수표</button><button class="small ghost" onclick="renderSetup()">설정</button></div>`}
    function showFinished(){app().className='tv'; app().innerHTML=`<div class="tvBox"><div class="missionMain">미션이 끝났습니다!</div><p class="safeLine">친구찾기 챌린지 완료</p><div class="navBtns" style="justify-content:center;margin-top:22px"><button class="good" onclick="recordWinner()">마지막 성공자 기록</button><button class="primary" onclick="renderScores()">점수표 확인</button><button class="ghost" onclick="renderSetup()">다시 설정</button></div></div>`;}
    function recordWinner(){let name=prompt('성공자 이름을 입력해 주세요.'); if(!name)return; name=name.trim(); if(!name)return; let found=state.scores.find(s=>s.name===name); if(found)found.score++; else state.scores.push({name,score:1}); state.scores.sort((a,b)=>b.score-a.score); save(); alert(name+' 친구를 기록했습니다.');}
    function renderScores(){clearAll(); app().className='wrap'; let rows=state.scores.map((s,i)=>`<div class="scoreRow"><span>${i+1}. ${escapeHtml(s.name)}</span><span>${s.score}점</span></div>`).join('')||'<p class="muted">아직 기록된 성공자가 없습니다.</p>'; app().innerHTML=`<section class="card"><h2>친구찾기 챌린지 점수표</h2><div class="resultList">${rows}</div><div class="navBtns" style="margin-top:18px"><button class="primary" onclick="renderSetup()">게임 설정</button><button class="danger" onclick="if(confirm('점수표를 초기화할까요?')){state.scores=[];save();renderScores()} ">점수표 초기화</button></div></section>`;}
    function renderMissionAdmin(){clearAll(); app().className='wrap'; let rows=state.missions.filter(m=>!m.deleted).map(m=>`<div class="missionRow"><button class="small star ${m.favorite?'on':''}" onclick="toggleFav('${m.id}')">★</button><button class="small x ${m.excluded?'on':''}" onclick="toggleX('${m.id}')">X</button><div><div class="missionText">${escapeHtml(m.text)}</div><div class="missionTag">${escapeHtml(m.tag)}</div></div><button class="small ghost" onclick="editMission('${m.id}')">수정</button><button class="small danger" onclick="delMission('${m.id}')">삭제</button></div>`).join(''); app().innerHTML=`<section class="card"><h2>친구찾기 미션 관리</h2><p class="muted">★ 즐겨찾기, X 제외, 삭제는 테스트용 로컬 저장입니다. 기본 미션은 복구할 수 있습니다.</p><div class="formGrid"><div style="grid-column:span 2"><label>새 미션</label><input id="newMission" placeholder="예: 같은 색 옷 친구와 하이파이브"></div><div><label>태그</label><input id="newTag" value="친구찾기"></div></div><div class="navBtns" style="margin:14px 0"><button class="good" onclick="addMission()">미션 추가</button><button class="warn" onclick="resetMissions()">기본 미션 복구</button><button class="primary" onclick="renderSetup()">설정으로</button></div><div class="missionList">${rows}</div></section>`;}
    function toggleFav(id){let m=state.missions.find(x=>x.id===id);m.favorite=!m.favorite;save();renderMissionAdmin()} function toggleX(id){let m=state.missions.find(x=>x.id===id);m.excluded=!m.excluded;save();renderMissionAdmin()} function editMission(id){let m=state.missions.find(x=>x.id===id);let t=prompt('미션 문구 수정',m.text); if(t){m.text=t.trim();save();renderMissionAdmin()}} function delMission(id){if(!confirm('이 미션을 삭제 처리할까요?'))return;let m=state.missions.find(x=>x.id===id);m.deleted=true;save();renderMissionAdmin()} function addMission(){let t=$('newMission').value.trim();let tag=$('newTag').value.trim()||'사용자추가';if(!t)return alert('미션을 입력해 주세요.');state.missions.push({id:'u'+Date.now(),text:t,tag,favorite:true,excluded:false,deleted:false});save();renderMissionAdmin()} function resetMissions(){if(!confirm('기본 미션 60개로 복구할까요? 점수표는 유지됩니다.'))return;state.missions=DEFAULT_MISSIONS.map(x=>({...x}));save();renderMissionAdmin()}
    function clearAll(all=true){if(state.timer)clearInterval(state.timer); if(state.countTimer)clearTimeout(state.countTimer); state.timer=null;state.countTimer=null}
    function escapeHtml(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
    openFriend();
  </script>
</body>
</html>
